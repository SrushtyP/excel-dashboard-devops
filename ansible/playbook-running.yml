---
- name: Start VM via Azure CLI
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Start VM in Azure
      shell: |
        az vm start \
          --resource-group $AZURE_RESOURCE_GROUP \
          --name vm-running
      environment:
        AZURE_RESOURCE_GROUP: "{{ lookup('env', 'AZURE_RESOURCE_GROUP') }}"

    - name: Wait for VM to be reachable on port 80
      wait_for:
        host: "{{ lookup('env', 'VM_IP') }}"
        port: 80
        delay: 15
        timeout: 120

    - name: Confirm app is live
      uri:
        url: "http://{{ lookup('env', 'VM_IP') }}:80"
        status_code: 200
      register: result

    - name: Print status
      debug:
        msg: "VM is RUNNING. HTTP Status: {{ result.status }}"