---
- name: Start VM (ensure running)
  hosts: webservers
  become: yes

  tasks:
    - name: Confirm VM is reachable
      ping:

    - name: Ensure Flask app is running
      shell: |
        if [ -f /tmp/flask.pid ] && kill -0 $(cat /tmp/flask.pid) 2>/dev/null; then
          echo "Flask already running"
        else
          cd /opt/dashboard-app && nohup python3 app.py > /tmp/dashboard.log 2>&1 & echo $! > /tmp/flask.pid
          echo "Flask started"
        fi
      args:
        executable: /bin/bash

    - name: Wait for Flask to be ready
      wait_for:
        port: 5000
        host: 0.0.0.0
        delay: 3
        timeout: 30

    - name: Confirm app is live
      shell: curl -s -o /dev/null -w "%{http_code}" http://localhost:5000
      register: http_status

    - name: Print status
      debug:
        msg: "VM is RUNNING. HTTP Status: {{ http_status.stdout }}"
