- name: Deploy Excel Dashboard App
  hosts: vm_running
  become: yes

  vars:
    app_dir: /opt/dashboard-app
    app_user: azureuser
    pat_token: ""
    owner: ""
    repo: "excel-dashboard-devops"

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Create uploads directory
      file:
        path: "{{ app_dir }}/uploads"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app.py
      copy:
        src: ../app/app.py
        dest: "{{ app_dir }}/app.py"
        owner: "{{ app_user }}"

    - name: Copy security.py
      copy:
        src: ../app/security.py
        dest: "{{ app_dir }}/security.py"
        owner: "{{ app_user }}"

    - name: Copy security_ciso.py
      copy:
        src: ../app/security_ciso.py
        dest: "{{ app_dir }}/security_ciso.py"
        owner: "{{ app_user }}"

    - name: Copy templates folder
      copy:
        src: ../app/templates/
        dest: "{{ app_dir }}/templates/"
        owner: "{{ app_user }}"

    - name: Copy static folder
      copy:
        src: ../app/static/
        dest: "{{ app_dir }}/static/"
        owner: "{{ app_user }}"

    - name: Create inventory directory
      file:
        path: "{{ app_dir }}/../inventory"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy inventory folder
      copy:
        src: ../inventory/
        dest: "{{ app_dir }}/../inventory/"
        owner: "{{ app_user }}"

    - name: Copy requirements.txt
      copy:
        src: ../requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: pip3

    - name: Install azure-mgmt-authorization
      pip:
        name: azure-mgmt-authorization
        executable: pip3

    # ── Frontend: built on the GitHub Actions runner (not on the VM)
    # The dist/ folder is produced before this playbook runs and
    # simply copied here — no Node.js needed on the VM at all.

    - name: Create frontend-dist directory on VM
      file:
        path: /opt/frontend-dist
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Upload built frontend dist to VM
      copy:
        src: ../frontend/dist/
        dest: /opt/frontend-dist/
        owner: "{{ app_user }}"

    - name: Kill existing Flask process
      shell: |
        sudo kill $(cat /tmp/flask.pid) 2>/dev/null || true
        sudo pkill -f "python3 app.py" 2>/dev/null || true
      ignore_errors: yes

    - name: Start Flask app in background
      shell: |
        cd {{ app_dir }} && \
        sudo PAT_TOKEN="{{ pat_token }}" \
        OWNER="{{ owner }}" \
        REPO="{{ repo }}" \
        AZURE_RESOURCE_GROUP="rg-dashboard-demo" \
        nohup python3 app.py > /tmp/dashboard.log 2>&1 & echo $! > /tmp/flask.pid
      args:
        executable: /bin/bash

    - name: Wait for app to start
      wait_for:
        port: 80
        host: 0.0.0.0
        delay: 5
        timeout: 30

    - name: Confirm app is running
      shell: curl -s -o /dev/null -w "%{http_code}" http://localhost:80
      register: http_status

    - name: Print status
      debug:
        msg: "App is live! HTTP Status: {{ http_status.stdout }}"