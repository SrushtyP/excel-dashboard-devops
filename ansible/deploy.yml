- name: Deploy Excel Dashboard App
  hosts: webservers
  become: yes

  vars:
    app_dir: /opt/dashboard-app
    app_user: azureuser

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Create uploads directory
      file:
        path: "{{ app_dir }}/uploads"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app.py
      copy:
        src: ../app/app.py
        dest: "{{ app_dir }}/app.py"
        owner: "{{ app_user }}"

    - name: Copy templates folder
      copy:
        src: ../app/templates/
        dest: "{{ app_dir }}/templates/"
        owner: "{{ app_user }}"

    - name: Copy static folder
      copy:
        src: ../app/static/
        dest: "{{ app_dir }}/static/"
        owner: "{{ app_user }}"

    - name: Create inventory directory
      file:
        path: "{{ app_dir }}/../inventory"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy inventory folder
      copy:
        src: ../inventory/
        dest: "{{ app_dir }}/../inventory/"
        owner: "{{ app_user }}"

    - name: Copy requirements.txt
      copy:
        src: ../requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: pip3

    - name: Install Node.js 20
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt-get install -y nodejs
      args:
        executable: /bin/bash

    # ✅ FIX: Create a tar archive of frontend source EXCLUDING node_modules and dist
    #         This avoids copying hundreds of MB of files over SSH one-by-one
    - name: Create frontend source archive (excluding node_modules and dist)
      delegate_to: localhost
      become: no
      shell: |
        tar --exclude='../frontend/node_modules' \
            --exclude='../frontend/dist' \
            --exclude='../frontend/.git' \
            -czf /tmp/frontend-src.tar.gz \
            -C ../frontend .
      args:
        executable: /bin/bash

    - name: Create frontend directory on VM
      file:
        path: "{{ app_dir }}/frontend"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Upload frontend archive to VM
      copy:
        src: /tmp/frontend-src.tar.gz
        dest: /tmp/frontend-src.tar.gz

    - name: Extract frontend source on VM
      shell: |
        tar -xzf /tmp/frontend-src.tar.gz -C {{ app_dir }}/frontend
        rm -f /tmp/frontend-src.tar.gz
      args:
        executable: /bin/bash

    # ✅ FIX: Set correct ownership BEFORE npm install
    #         Without this, node_modules/.bin/vite is root-owned → rc:126 Permission denied
    - name: Set frontend directory ownership to azureuser
      file:
        path: "{{ app_dir }}/frontend"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # ✅ FIX: Run npm install and build as azureuser with explicit PATH
    #         Using 'npm run build' via sudo loses PATH; call vite directly instead
    - name: Install frontend npm dependencies
      shell: |
        export PATH=$PATH:/usr/bin:/usr/local/bin
        cd {{ app_dir }}/frontend
        npm install
        chmod -R 755 node_modules/.bin
      become: yes
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: Build React frontend
      shell: |
        export PATH=$PATH:/usr/bin:/usr/local/bin
        cd {{ app_dir }}/frontend
        ./node_modules/.bin/vite build
      become: yes
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: Create frontend-dist directory
      file:
        path: /opt/frontend-dist
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy built frontend to serve location
      shell: cp -r {{ app_dir }}/frontend/dist/. /opt/frontend-dist/
      args:
        executable: /bin/bash

    - name: Kill existing Flask process
      shell: |
        kill $(cat /tmp/flask.pid) 2>/dev/null || true
      ignore_errors: yes

    - name: Start Flask app in background
      shell: |
        cd {{ app_dir }} && nohup python3 app.py > /tmp/dashboard.log 2>&1 & echo $! > /tmp/flask.pid
      args:
        executable: /bin/bash

    - name: Wait for app to start
      wait_for:
        port: 5000
        host: 0.0.0.0
        delay: 5
        timeout: 30

    - name: Confirm app is running
      shell: curl -s -o /dev/null -w "%{http_code}" http://localhost:80
      register: http_status

    - name: Print status
      debug:
        msg: "App is live! HTTP Status: {{ http_status.stdout }}"