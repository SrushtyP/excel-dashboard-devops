---
- name: Snooze VM via Azure CLI (deallocate)
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Deallocate VM in Azure
      shell: |
        az vm deallocate \
          --resource-group $AZURE_RESOURCE_GROUP \
          --name vm-snoozed
      environment:
        AZURE_RESOURCE_GROUP: "{{ lookup('env', 'AZURE_RESOURCE_GROUP') }}"

    - name: Print snooze status
      debug:
        msg: "VM deallocated. Billing stopped. VM marked as SNOOZED."