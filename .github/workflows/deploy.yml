name: Deploy Excel Dashboard to Azure
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible and sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y ansible sshpass

      - name: Create inventory
        run: |
          echo "[webservers]" > ansible/inventory.ini
          echo "${{ secrets.VM_IP }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/deploy.yml

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VM_IP }}:5000)
          if [ "$STATUS" = "200" ]; then
            echo "App is live at http://${{ secrets.VM_IP }}:5000"
          else
            echo "Verification failed - Status: $STATUS"
            exit 1
          fi
