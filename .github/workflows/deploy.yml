name: Deploy Excel Dashboard to Azure
on:
  push:
    branches:
      - main
      - testing-branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Create tfvars
        run: |
          echo "subscription_id = \"${{ secrets.AZURE_SUBSCRIPTION_ID }}\"" > terraform/terraform.tfvars
          echo "client_id = \"${{ secrets.AZURE_CLIENT_ID }}\"" >> terraform/terraform.tfvars
          echo "client_secret = \"${{ secrets.AZURE_CLIENT_SECRET }}\"" >> terraform/terraform.tfvars
          echo "tenant_id = \"${{ secrets.AZURE_TENANT_ID }}\"" >> terraform/terraform.tfvars
          echo "admin_password = \"${{ secrets.VM_PASSWORD }}\"" >> terraform/terraform.tfvars

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform init -reconfigure

      - name: Import existing resource group if needed
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          RG_ID="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-drishti-demo"
          if ! terraform state show azurerm_resource_group.rg > /dev/null 2>&1; then
            echo "Resource group not in state — importing..."
            terraform import -var-file="terraform.tfvars" azurerm_resource_group.rg "$RG_ID"
          else
            echo "Resource group already in state — skipping import."
          fi

      - name: Terraform Apply
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Get VM IP from Terraform
        id: get_ip
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          IP_RUNNING=$(terraform output -raw vm_running_ip)
          IP_SNOOZED=$(terraform output -raw vm_snoozed_ip)
          echo "ip_running=$IP_RUNNING" >> $GITHUB_OUTPUT
          echo "ip_snoozed=$IP_SNOOZED" >> $GITHUB_OUTPUT
          echo "vm-running IP: $IP_RUNNING"
          echo "vm-snoozed IP: $IP_SNOOZED"

      - name: Install Ansible and sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y ansible sshpass azure-cli

      - name: Create Ansible inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [webservers]
          ${{ steps.get_ip.outputs.ip_running }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          ${{ steps.get_ip.outputs.ip_snoozed }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [vm_running]
          ${{ steps.get_ip.outputs.ip_running }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [vm_snoozed]
          ${{ steps.get_ip.outputs.ip_snoozed }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Create azure_config.json
        run: |
          cat > inventory/azure_config.json << EOF
          {
            "tenant_id"      : "${{ secrets.AZURE_TENANT_ID }}",
            "client_id"      : "${{ secrets.AZURE_CLIENT_ID }}",
            "client_secret"  : "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }
          EOF

      - name: Install dependencies on VM
        run: |
          sshpass -p "${{ secrets.VM_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            azureuser@${{ steps.get_ip.outputs.ip_running }} \
            "sudo apt update -y && sudo apt install python3-pip -y && sudo pip3 install flask flask-cors pandas openpyxl plotly pyyaml requests azure-identity azure-mgmt-compute azure-mgmt-consumption azure-mgmt-authorization"

      - name: Build React frontend on runner
        run: |
          cd frontend
          npm ci
          NODE_OPTIONS="--max-old-space-size=4096" npx vite build

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            --limit vm_running \
            -e "pat_token=${{ secrets.PAT_TOKEN }}" \
            -e "owner=${{ github.repository_owner }}" \
            -e "repo=excel-dashboard-devops"

      - name: Azure CLI Login
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run state playbooks per VM
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          VM_IP: ${{ steps.get_ip.outputs.ip_running }}
        run: |
          while IFS= read -r line; do
            VM_ID=$(echo "$line" | cut -d'|' -f1)
            STATE=$(echo "$line" | cut -d'|' -f2)
            echo "VM: $VM_ID -> $STATE"
            case "$STATE" in
              running)
                ansible-playbook -i ansible/inventory.ini ansible/playbook-running.yml
                ;;
              snoozed)
                ansible-playbook -i ansible/inventory.ini ansible/playbook-snooze.yml
                ;;
              destroyed)
                ansible-playbook -i ansible/inventory.ini ansible/playbook-destroy.yml
                ;;
            esac
          done < <(python3 -c "
          import json
          with open('inventory/inventory.json') as f:
              d = json.load(f)
          for vm in d['vms']:
              print(vm['id'] + '|' + vm['desired_state'])
          ")

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ steps.get_ip.outputs.ip_running }})
          if [ "$STATUS" = "200" ]; then
            echo "✅ App is live at http://${{ steps.get_ip.outputs.ip_running }}"
          else
            echo "❌ Verification failed - HTTP Status: $STATUS"
            exit 1
          fi