name: Deploy Excel Dashboard to Azure
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Create tfvars
        run: |
          echo "subscription_id = \"${{ secrets.AZURE_SUBSCRIPTION_ID }}\"" > terraform/terraform.tfvars
          echo "client_id = \"${{ secrets.AZURE_CLIENT_ID }}\"" >> terraform/terraform.tfvars
          echo "client_secret = \"${{ secrets.AZURE_CLIENT_SECRET }}\"" >> terraform/terraform.tfvars
          echo "tenant_id = \"${{ secrets.AZURE_TENANT_ID }}\"" >> terraform/terraform.tfvars
          echo "admin_password = \"${{ secrets.VM_PASSWORD }}\"" >> terraform/terraform.tfvars

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -backend=false

      - name: Terraform Import and Apply
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="rg-dashboard-demo"

          import_if_exists() {
            RESOURCE=$1
            ID=$2
            echo "Importing $RESOURCE..."
            terraform import -var-file="terraform.tfvars" "$RESOURCE" "$ID" 2>&1 && echo "Imported $RESOURCE" || echo "Skipping $RESOURCE (not found or already imported)"
          }

          import_if_exists azurerm_resource_group.rg \
            "/subscriptions/$SUB/resourceGroups/$RG"

          import_if_exists azurerm_virtual_network.vnet \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/vnet-dashboard"

          import_if_exists azurerm_subnet.subnet \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/vnet-dashboard/subnets/subnet-dashboard"

          import_if_exists azurerm_public_ip.public_ip \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/publicIPAddresses/pip-dashboard"

          import_if_exists azurerm_network_security_group.nsg \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/nsg-dashboard"

          import_if_exists azurerm_network_interface.nic \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkInterfaces/nic-dashboard"

          import_if_exists azurerm_network_interface_security_group_association.nic_nsg \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkInterfaces/nic-dashboard|/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/nsg-dashboard"

          import_if_exists azurerm_linux_virtual_machine.vm \
            "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Compute/virtualMachines/vm-dashboard"

          echo "All imports done — running apply..."
          terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Get VM IP from Terraform
        id: get_ip
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          IP=$(terraform output -raw public_ip_address)
          echo "vm_ip=$IP" >> $GITHUB_OUTPUT
          echo "VM Public IP: $IP"

      - name: Install Ansible and sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y ansible sshpass

      - name: Create Ansible inventory
        run: |
          echo "[webservers]" > ansible/inventory.ini
          echo "${{ steps.get_ip.outputs.vm_ip }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini

      - name: Install Flask on VM
        run: |
          sshpass -p "${{ secrets.VM_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            azureuser@${{ steps.get_ip.outputs.vm_ip }} \
            "sudo apt update -y && sudo apt install python3-pip -y && sudo pip3 install flask flask-cors pandas openpyxl plotly pyyaml"

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/deploy.yml

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ steps.get_ip.outputs.vm_ip }}:5000)
          if [ "$STATUS" = "200" ]; then
            echo "App is live at http://${{ steps.get_ip.outputs.vm_ip }}:5000"
          else
            echo "Verification failed - Status: $STATUS"
            exit 1
          fi