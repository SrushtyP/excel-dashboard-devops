#hi
name: Deploy Excel Dashboard to Azure
on:
  push:
    branches:
      - main
      - testing-branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Create tfvars
        run: |
          echo "subscription_id = \"${{ secrets.AZURE_SUBSCRIPTION_ID }}\"" > terraform/terraform.tfvars
          echo "client_id = \"${{ secrets.AZURE_CLIENT_ID }}\"" >> terraform/terraform.tfvars
          echo "client_secret = \"${{ secrets.AZURE_CLIENT_SECRET }}\"" >> terraform/terraform.tfvars
          echo "tenant_id = \"${{ secrets.AZURE_TENANT_ID }}\"" >> terraform/terraform.tfvars
          echo "admin_password = \"${{ secrets.VM_PASSWORD }}\"" >> terraform/terraform.tfvars
          echo "create_vm_destroyed = false" >> terraform/terraform.tfvars

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform init -reconfigure

      - name: Terraform Apply
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      # ── Get IPs for all provisioned VMs ──────────────────────────────────────
      - name: Get VM IPs from Terraform
        id: get_ips
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          IP_RUNNING=$(terraform output -raw vm_running_ip)
          IP_SNOOZED=$(terraform output -raw vm_snoozed_ip)
          echo "ip_running=$IP_RUNNING" >> $GITHUB_OUTPUT
          echo "ip_snoozed=$IP_SNOOZED" >> $GITHUB_OUTPUT
          echo "vm-running IP: $IP_RUNNING"
          echo "vm-snoozed IP: $IP_SNOOZED"

      - name: Install Ansible and sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y ansible sshpass

      # ── Ansible inventory: vm-running only (app deploys here) ────────────────
      - name: Create Ansible inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [vm_running]
          ${{ steps.get_ips.outputs.ip_running }} ansible_user=azureuser ansible_password=${{ secrets.VM_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Create azure_config.json
        run: |
          cat > inventory/azure_config.json << EOF
          {
            "tenant_id"      : "${{ secrets.AZURE_TENANT_ID }}",
            "client_id"      : "${{ secrets.AZURE_CLIENT_ID }}",
            "client_secret"  : "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }
          EOF

      - name: Install Flask on vm-running
        run: |
          sshpass -p "${{ secrets.VM_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            azureuser@${{ steps.get_ips.outputs.ip_running }} \
            "sudo apt update -y && sudo apt install python3-pip -y && sudo pip3 install flask flask-cors pandas openpyxl plotly pyyaml"

      - name: Package frontend source
        run: |
          tar --exclude='frontend/node_modules' \
              --exclude='frontend/dist' \
              --exclude='frontend/.git' \
              -czf /tmp/frontend-src.tar.gz \
              -C frontend .

      # ── Deploy app ONLY to vm-running ─────────────────────────────────────────
      - name: Deploy app to vm-running
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            --limit vm_running \
            -e "pat_token=${{ secrets.PAT_TOKEN }}" \
            -e "owner=${{ secrets.OWNER }}"

      # ── Handle VM states ──────────────────────────────────────────────────────
      # vm-running  → ensure Flask is running (Ansible)
      # vm-snoozed  → deallocate via Azure CLI (zero compute cost)
      # vm-destroyed → already not provisioned (Terraform count=0)
      - name: Apply VM states
        run: |
          # Ensure vm-running Flask is up
          ansible-playbook -i ansible/inventory.ini ansible/playbook-running.yml \
            --limit vm_running \
            -e "pat_token=${{ secrets.PAT_TOKEN }}" \
            -e "owner=${{ secrets.OWNER }}"

          # Deallocate vm-snoozed via Azure CLI
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

          az vm deallocate \
            --resource-group rg-dashboard-demo \
            --name vm-snoozed \
            --no-wait

          echo "vm-snoozed deallocated — zero compute cost"
          echo "vm-destroyed not provisioned — Terraform count=0"

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ steps.get_ips.outputs.ip_running }}:5000)
          if [ "$STATUS" = "200" ]; then
            echo "App is live at http://${{ steps.get_ips.outputs.ip_running }}:5000"
          else
            echo "Verification failed - Status: $STATUS"
            exit 1
          fi