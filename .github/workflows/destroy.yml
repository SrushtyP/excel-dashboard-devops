name: Destroy Azure Infrastructure
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm'
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "You must type DESTROY to confirm. Aborting."
            exit 1
          fi
          echo "Confirmed. Proceeding with destroy."

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Start vm-snoozed if deallocated (so Terraform can power it off cleanly)
        run: |
          STATE=$(az vm get-instance-view \
            --resource-group rg-dashboard-demo \
            --name vm-snoozed \
            --query "instanceView.statuses[1].code" \
            --output tsv 2>/dev/null || echo "not_found")
          echo "vm-snoozed power state: $STATE"
          if [[ "$STATE" == *"deallocated"* ]]; then
            echo "VM is deallocated — starting it so Terraform can destroy cleanly..."
            az vm start --resource-group rg-dashboard-demo --name vm-snoozed
            echo "VM started."
          else
            echo "VM is not deallocated — no action needed."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Create tfvars
        run: |
          echo "subscription_id = \"${{ secrets.AZURE_SUBSCRIPTION_ID }}\"" > terraform/terraform.tfvars
          echo "client_id = \"${{ secrets.AZURE_CLIENT_ID }}\"" >> terraform/terraform.tfvars
          echo "client_secret = \"${{ secrets.AZURE_CLIENT_SECRET }}\"" >> terraform/terraform.tfvars
          echo "tenant_id = \"${{ secrets.AZURE_TENANT_ID }}\"" >> terraform/terraform.tfvars
          echo "admin_password = \"${{ secrets.VM_PASSWORD }}\"" >> terraform/terraform.tfvars
          echo "create_vm_destroyed = false" >> terraform/terraform.tfvars

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform init -reconfigure

      - name: Terraform Destroy
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: terraform destroy -var-file="terraform.tfvars" -auto-approve

      - name: Done
        run: |
          echo "All Azure infrastructure destroyed successfully."
          echo "To redeploy: push any commit to main branch."